name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Daily rebuild so the GitHub-driven project state stays fresh without a code push.
  schedule:
    - cron: '0 6 * * *'
  # Allows manual runs from the Actions tab.
  workflow_dispatch:

# Allow the job to clone the repo and create a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        env:
          # Authenticates the build-time GitHub API calls (higher rate limit, public read).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
